# Секреты: Settings → Secrets and variables → Actions
#   DEPLOY_WEBHOOK_URL — URL вебхука, например http://194.87.200.201:9001/deploy
#   Вариант A: Repository secrets — секрет в разделе «Repository secrets», environment в job не нужен.
#   Вариант B: Environment secrets — создано окружение в Settings → Environments, секрет привязан к нему;
#              ниже в job должно быть environment: <точное имя окружения>.
#   DEPLOY_REPO_NAME / DEPLOY_REF — не обязательны (см. шаг run).

name: Deploy to TimeWeb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment secrets: имя как в Settings → Environments. Если DEPLOY_WEBHOOK_URL только в Repository secrets — удалите две строки ниже (environment + комментарий).
    environment: DoctorSkripnikova
    steps:
      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_REPO_NAME: ${{ secrets.DEPLOY_REPO_NAME }}
          DEPLOY_REF: ${{ secrets.DEPLOY_REF }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Set DEPLOY_WEBHOOK_URL in GitHub Secrets (e.g. http://YOUR_IP:9001/deploy)"
            exit 1
          fi

          REF_VALUE="${DEPLOY_REF:-refs/heads/main}"
          REPO_NAME="${DEPLOY_REPO_NAME:-DoctorSkripnikovaViktoria}"

          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${REF_VALUE}\",\"repository\":\"${REPO_NAME}\"}"
