services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
      # HTTPS: хост 9443 → 443 в контейнере (8443 часто занят — смотри ss -tlnp | grep 8443)
      - "9443:443"
    volumes:
      - .:/var/www/html
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    command: sh -c "mkdir -p storage && chmod 777 storage && composer install --no-interaction --prefer-dist --optimize-autoloader && exec php-fpm"
    restart: unless-stopped
