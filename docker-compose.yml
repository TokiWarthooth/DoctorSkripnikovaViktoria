services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    command: sh -c "mkdir -p storage && chmod 777 storage && composer install --no-interaction --prefer-dist --optimize-autoloader && exec php-fpm"
