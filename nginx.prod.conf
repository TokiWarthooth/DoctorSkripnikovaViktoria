# HTTP → редирект на HTTPS (порт снаружи см. docker-compose: обычно 8080 → 80)
server {
    listen 80;
    server_name doctorskripnikova.ru www.doctorskripnikova.ru 194.87.200.201;
    root /var/www/html/public;
    index index.php;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        allow all;
    }

    location / {
        return 301 https://$host:8081$request_uri;
    }
}

# HTTPS (в контейнере порт 443; снаружи мапится на 8081)
server {
    listen 443 ssl;
    http2 on;
    server_name doctorskripnikova.ru www.doctorskripnikova.ru 194.87.200.201;
    root /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
