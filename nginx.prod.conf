# Продакшен: HTTP 80 (ACME + fallback по IP:8081) + HTTPS 443 (нужны ssl/fullchain.pem и ssl/privkey.pem).
# Без файлов в ssl/ nginx не стартует — один раз: ./scripts/ssl-selfsigned.sh doctorskripnikova.ru
# затем замените на Let's Encrypt (скопируйте fullchain.pem и privkey.pem в ssl/).
#
# Как у первого сайта: если SSL завершён на ХОСТЕ (certbot + proxy на :8081), можно убрать блок
# listen 443 и порт 9443 на хосте в compose — тогда достаточно одного server на 80.

# По IP или неизвестный Host — без редиректа на HTTPS (удобно для :8081)
server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        default_type "text/plain";
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}

# Домен по HTTP → HTTPS (кроме ACME)
server {
    listen 80;
    server_name doctorskripnikova.ru www.doctorskripnikova.ru;
    root /var/www/html/public;
    index index.php;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name doctorskripnikova.ru www.doctorskripnikova.ru;
    root /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
