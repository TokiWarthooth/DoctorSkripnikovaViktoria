# Продакшен: HTTP :80 в контейнере (с хоста прокси на :8081) + HTTPS :443 в контейнере (доступ с хоста :9443).
# За хостовым nginx с TLS нельзя делать 301 на https с :80 контейнера для домена — будет цикл редиректов.
#
# Публичный https://doctorskripnikova.ru — nginx на СЕРВЕРЕ (80/443), см. scripts/nginx-host-doctorskripnikova.conf.example
# Серты в контейнере: ssl/fullchain.pem, ssl/privkey.pem (ssl-selfsigned.sh или копия LE).

server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        default_type "text/plain";
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name doctorskripnikova.ru www.doctorskripnikova.ru;
    root /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
